version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: continental_db
    environment:
      POSTGRES_USER: continental
      POSTGRES_PASSWORD: continental_dev
      POSTGRES_DB: continental
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U continental"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
