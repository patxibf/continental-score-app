name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/**'
      - 'packages/bot/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate -w packages/backend

      - name: Build backend
        run: npm run build -w packages/backend

      - name: Build bot
        run: npm run build -w packages/bot

      - name: Copy backend dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "packages/backend/dist/"
          target: "/app/continental/packages/backend/"
          strip_components: 2
          timeout: 60s
          command_timeout: 20m

      - name: Copy bot dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "packages/bot/dist/"
          target: "/app/continental/packages/bot/"
          strip_components: 2
          timeout: 60s
          command_timeout: 20m

      - name: Run migrations and restart on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /app/continental
            npm install --omit=dev
            npm run db:migrate:deploy -w packages/backend
            pm2 restart continental-api || pm2 start packages/backend/dist/index.js --name continental-api
            pm2 restart continental-bot || pm2 start packages/bot/dist/index.js --name continental-bot
            pm2 save

